<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <!-- Login box -->
  <rect x="400" y="100" width="400" height="400" rx="16" fill="#21262d" stroke="#30363d" stroke-width="2"/>
  
  <!-- Logo -->
  <text x="600" y="160" font-family="Arial" font-size="42" fill="#00d4ff" text-anchor="middle">INV<span fill="#ff6b6b">BIT</span></text>
  
  <!-- Login form -->
  <rect x="440" y="200" width="320" height="48" rx="8" fill="#0d1117"/>
  <text x="460" y="225" font-family="Arial" font-size="14" fill="#8b949e">Username</text>
  
  <rect x="440" y="260" width="320" height="48" rx="8" fill="#0d1117"/>
  <text x="460" y="285" font-family="Arial" font-size="14" fill="#8b949e">Password</text>
  
  <rect x="440" y="320" width="320" height="48" rx="8" fill="#1f6feb"/>
  <text x="600" y="348" font-family="Arial" font-size="16" fill="white" text-anchor="middle">Sign In</text>
  
  <!-- Footer -->
  <text x="600" y="410" font-family="Arial" font-size="12" fill="#484f58" text-anchor="middle">Default: harysr / xcxcxc</text>
  
  <!-- Caption -->
  <text x="600" y="520" font-family="Arial" font-size="18" fill="#8b949e" text-anchor="middle">INVDB — Authentication</text>
  <text x="600" y="550" font-family="Arial" font-size="14" fill="#484f58" text-anchor="middle">Protected routes redirect to login</text>
</svg>