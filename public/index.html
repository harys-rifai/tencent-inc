<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INVBIT — Dashboard</title>
  <meta name="description" content="INVBIT inventory management dashboard" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⬡</div>
      <span class="logo-text">INV<span class="accent">BIT</span></span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Dashboard</div>
      <a href="index.html" class="nav-item active">
        <span class="nav-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
        Overview
      </a>
      <a href="inventory.html" class="nav-item">
        <span class="nav-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg></span>
        Inventory
      </a>
      <a href="network.html" class="nav-item">
        <span class="nav-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49M7.76 16.24a6 6 0 0 1 0-8.49M20.49 3.51a14 14 0 0 1 0 19.8M3.51 20.49a14 14 0 0 1 0-19.8"/></svg></span>
        Network
      </a>
      <a href="tasks.html" class="nav-item">
        <span class="nav-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>
        Tasks
      </a>
      <div class="nav-section-label" style="margin-top:1rem">System</div>
      <a href="search.html" class="nav-item">
        <span class="nav-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        Search
      </a>
      <a href="settings.html" class="nav-item">
        <span class="nav-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
        Settings
      </a>
    </nav>
     <div class="sidebar-footer">
       <div class="status-dot online"></div>
       <span id="sidebarUser">admin</span>
       <button class="btn-sm" onclick="logout()" title="Logout" style="margin-left:0.5rem;background:transparent;border:1px solid var(--border);color:var(--red);padding:0.25rem 0.5rem;border-radius:4px;font-size:0.7rem">Logout</button>
     </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div class="topbar-title">Overview</div>
      <div class="topbar-right">
        <div class="health-badge" id="healthBadge">
          <span class="health-dot"></span> SYSTEM ONLINE
        </div>
        <div class="user-chip">
          <span class="user-avatar">A</span>
          <span>admin</span>
        </div>
      </div>
    </header>

    <div class="page-wrapper">
      <div class="stats-grid">
        <div class="stat-card cyan">
          <div class="stat-icon-wrap">📦</div>
          <div class="stat-info">
            <div class="stat-value" id="statTotal">—</div>
            <div class="stat-label">Total Items</div>
          </div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon-wrap">✅</div>
          <div class="stat-info">
            <div class="stat-value" id="statActive">—</div>
            <div class="stat-label">Active Items</div>
          </div>
        </div>
        <div class="stat-card purple">
          <div class="stat-icon-wrap">⏸️</div>
          <div class="stat-info">
            <div class="stat-value" id="statInactive">—</div>
            <div class="stat-label">Inactive Items</div>
          </div>
        </div>
        <div class="stat-card orange">
          <div class="stat-icon-wrap">🗄️</div>
          <div class="stat-info">
            <div class="stat-value" id="statDB">OK</div>
            <div class="stat-label">Database</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Recent Inventory Items</span>
          <button class="btn-sm" onclick="location.href='inventory.html'">View All →</button>
        </div>
        <div class="panel-body no-pad" id="recentItems">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>
  </main>

    <script>
     document.getElementById('menuToggle').onclick = () => document.getElementById('sidebar').classList.toggle('open');

     // Get current user & session
     const currentUser = JSON.parse(localStorage.getItem('invbit_user') || '{}');
     const sessionId = localStorage.getItem('invbit_session');

     // Update sidebar username
     const userSpan = document.getElementById('sidebarUser');
     if (userSpan && currentUser.username) {
       userSpan.textContent = currentUser.username;
     }

     // Session verification
     (async () => {
       if (!sessionId) {
         window.location.href = '/login';
         return;
       }
       try {
         const res = await fetch('/auth/verify', {
           headers: { 'X-Session-Id': sessionId }
         });
         if (!res.ok) {
           localStorage.removeItem('invbit_session');
           localStorage.removeItem('invbit_user');
           window.location.href = '/login';
           return;
         }
       } catch {
         window.location.href = '/login';
       }
     })();

     // Hide Settings menu if not admin
     if (currentUser.role !== 'admin') {
       const settingsLink = document.querySelector('a[href="settings.html"]');
       if (settingsLink) settingsLink.style.display = 'none';
     }

     const authHeaders = {
       headers: {
         'Content-Type': 'application/json',
         'X-Session-Id': sessionId || ''
       }
     };

     function logout() {
       fetch('/auth/logout', {
         method: 'POST',
         headers: { 'X-Session-Id': sessionId }
       }).finally(() => {
         localStorage.removeItem('invbit_session');
         localStorage.removeItem('invbit_user');
         window.location.href = '/login';
       });
     }

     async function loadStats() {
       try {
         const [statsRes, recentRes] = await Promise.all([
           fetch('/inventory/stats', authHeaders),
           fetch('/inventory?page=1&limit=6', authHeaders)
         ]);
         const stats  = await statsRes.json();
         const recent = await recentRes.json();
         document.getElementById('statTotal').textContent    = stats.total    || 0;
         document.getElementById('statActive').textContent   = stats.active   || 0;
         document.getElementById('statInactive').textContent = stats.inactive || 0;

         const items = recent.data || [];
         if (!items.length) {
           document.getElementById('recentItems').innerHTML = '<div class="empty-state"><p>No inventory items yet</p></div>';
           return;
         }
         document.getElementById('recentItems').innerHTML =
           '<div style="padding:0 1.25rem">' +
           items.map(item => `
             <div class="recent-row">
               <div>
                 <div class="recent-ip">${item.ip || '—'}</div>
                 <div class="recent-type">${item.type || '—'} ${item.version ? '· v' + item.version : ''}</div>
               </div>
               <span class="${item.active ? 'status-active' : 'status-inactive'}">${item.active ? 'Active' : 'Inactive'}</span>
             </div>`).join('') + '</div>';
       } catch {
         ['statTotal','statActive','statInactive'].forEach(id => document.getElementById(id).textContent = '0');
         document.getElementById('healthBadge').className = 'health-badge error';
         document.getElementById('healthBadge').innerHTML = '<span class="health-dot"></span> DB ERROR';
       }
     }
     loadStats();
  </script>
</body>
</html>
