<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INVBIT — Login</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg2);
    }
    .login-box {
      width: 360px;
      padding: 2.5rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,.25);
    }
    .login-title {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 1.5rem;
      color: var(--accent);
    }
    .login-footer {
      margin-top: 1.5rem;
      text-align: center;
      color: var(--text-dim);
      font-size: .75rem;
    }
  </style>
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-title">INV<span class="accent">BIT</span> Login</div>
    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-primary" style="width:100%;margin-top:.5rem">Sign In</button>
      <div class="form-error" id="loginError" style="text-align:center;margin-top:.75rem"></div>
    </form>
    <div class="login-footer">
      Default admin: harysr / Password09
    </div>
  </div>

  <script>
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const err = document.getElementById('loginError');
      err.textContent = '';
      if (!u || !p) {
        err.textContent = 'Username and password required';
        return;
      }
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json();
        if (!res.ok) {
          err.textContent = data.error || 'Login failed';
          return;
        }
        localStorage.setItem('invbit_user', JSON.stringify(data.user));
        window.location.href = '/';
      } catch {
        err.textContent = 'Network error';
      }
    };

    // If already logged in, redirect to home
    if (localStorage.getItem('invbit_user')) {
      window.location.href = '/';
    }
  </script>
</body>
</html>
