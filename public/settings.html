<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INVBIT — Settings</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">⬡</div><span class="logo-text">INV<span class="accent">BIT</span></span></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Dashboard</div>
      <a href="index.html" class="nav-item"><span class="nav-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>Overview</a>
      <a href="inventory.html" class="nav-item"><span class="nav-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg></span>Inventory</a>
      <a href="network.html" class="nav-item"><span class="nav-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49M7.76 16.24a6 6 0 0 1 0-8.49M20.49 3.51a14 14 0 0 1 0 19.8M3.51 20.49a14 14 0 0 1 0-19.8"/></svg></span>Network</a>
      <a href="tasks.html" class="nav-item"><span class="nav-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>Tasks</a>
      <div class="nav-section-label" style="margin-top:1rem">System</div>
      <a href="search.html" class="nav-item"><span class="nav-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>Search</a>
      <a href="settings.html" class="nav-item active"><span class="nav-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>Settings</a>
    </nav>
    <div class="sidebar-footer"><div class="status-dot online"></div><span>admin</span></div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
      <div class="topbar-title">Settings</div>
      <div class="topbar-right">
        <div class="health-badge"><span class="health-dot"></span> SYSTEM ONLINE</div>
      </div>
    </header>

    <div class="page-wrapper">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem">

        <!-- Connection Config -->
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Database Connection</span></div>
          <div class="panel-body">
            <div class="form-row">
              <div class="form-group"><label>DB Host</label><input type="text" id="dbHost" value="localhost" /></div>
              <div class="form-group"><label>DB Port</label><input type="text" id="dbPort" value="5432" /></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Redis Host</label><input type="text" id="redisHost" value="localhost" /></div>
              <div class="form-group"><label>Redis Port</label><input type="text" id="redisPort" value="6379" /></div>
            </div>
            <button class="btn-primary" onclick="saveSettings()" style="margin-top:.5rem">Save Configuration</button>
          </div>
        </div>

        <!-- Add User -->
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Add New User</span></div>
          <div class="panel-body">
            <div class="form-group"><label>Username</label><input type="text" id="newUsername" placeholder="john_doe" /></div>
            <div class="form-group"><label>Password</label><input type="password" id="newPassword" placeholder="••••••••" /></div>
            <div class="form-group"><label>Role</label>
              <select id="newRole">
                <option value="user">User</option>
                <option value="dba">DBA</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <button class="btn-primary" onclick="addUser()">Add User</button>
          </div>
        </div>
      </div>

      <!-- User Management -->
      <div class="panel section-gap">
        <div class="panel-header">
          <span class="panel-title">User Management</span>
           <div style="display:flex;gap:.5rem;align-items:center">
             <select class="filter-select" id="userLimit" onchange="loadUsers(1)">
               <option value="10" selected>10/pg</option>
               <option value="20">20/pg</option>
               <option value="50">50/pg</option>
             </select>
             <button class="btn-sm" onclick="loadUsers(1)">↻ Refresh</button>
             <button class="btn-primary btn-sm" onclick="exportTable('users')">Export CSV</button>
           </div>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr><th>ID</th><th>Username</th><th>Role</th><th>Created</th><th>Actions</th></tr>
            </thead>
            <tbody id="usersBody">
              <tr><td colspan="5" class="loading-cell"><div class="loading-dots"><span></span><span></span><span></span></div></td></tr>
            </tbody>
          </table>
        </div>
         <div class="pagination" id="userPager"></div>
       </div> <!-- close User Management panel -->
       <div class="panel section-gap">
         <div class="panel-header">
           <span class="panel-title">Error Logs</span>
           <div style="display:flex;gap:.5rem;align-items:center">
             <button class="btn-primary btn-sm" onclick="exportTable('error_logs')">Export CSV</button>
           </div>
         </div>
         <div class="table-wrapper">
           <table class="data-table">
             <thead>
               <tr><th>#</th><th>Level</th><th>Message</th><th>Source</th><th>Route</th><th>Created</th></tr>
             </thead>
             <tbody id="errorsBody">
               <tr><td colspan="6" class="loading-cell"><div class="loading-dots"><span></span><span></span><span></span></div></td></tr>
             </tbody>
           </table>
         </div>
       </div>

       <!-- Menu Items -->
       <div class="panel section-gap">
         <div class="panel-header">
           <span class="panel-title">Menu Items</span>
           <div style="display:flex;gap:.5rem;align-items:center">
             <button class="btn-primary btn-sm" onclick="exportTable('menu_items')">Export CSV</button>
           </div>
         </div>
         <div class="table-wrapper">
           <table class="data-table">
             <thead>
               <tr><th>#</th><th>Label</th><th>Icon</th><th>Href</th><th>Order</th><th>Active</th></tr>
             </thead>
             <tbody id="menuBody">
               <tr><td colspan="6" class="loading-cell"><div class="loading-dots"><span></span><span></span><span></span></div></td></tr>
             </tbody>
           </table>
         </div>
       </div>
     </div>
   </main>

  <div class="toast" id="toast"></div>

   <script>
    document.getElementById('menuToggle').onclick = () => document.getElementById('sidebar').classList.toggle('open');

    // Auth guard
    if (!localStorage.getItem('invbit_user')) {
      window.location.href = '/login';
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = (type === 'success' ? '✓ ' : '✗ ') + msg;
      t.className = 'toast ' + type + ' show';
      setTimeout(() => t.className = 'toast', 3000);
    }

    function saveSettings() { showToast('Configuration saved'); }

    async function addUser() {
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value;
      const role     = document.getElementById('newRole').value;
      if (!username || !password) { showToast('Username and password required', 'error'); return; }
      try {
        const res = await fetch('/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, role })
        });
        if (!res.ok) throw new Error();
        document.getElementById('newUsername').value = '';
        document.getElementById('newPassword').value = '';
        showToast('User added');
        loadUsers();
      } catch { showToast('Failed to add user', 'error'); }
    }

    async function deleteUser(id) {
      if (!confirm('Delete user ' + id + '?')) return;
      try {
        const res = await fetch(`/users/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Delete failed');
        showToast('User deleted');
        loadUsers();
      } catch {
        showToast('Delete failed', 'error');
      }
    }

     async function exportTable(table) {
       try {
         const res = await fetch(`/export/${table}`);
         if (!res.ok) throw new Error('Export failed');
         const csv = await res.text();
         const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
         const url = URL.createObjectURL(blob);
         const a = document.createElement('a');
         a.href = url;
         a.download = res.headers.get('Content-Disposition').split('filename=')[1].replace(/"/g, '');
         document.body.appendChild(a);
         a.click();
         document.body.removeChild(a);
         URL.revokeObjectURL(url);
         showToast('Export started');
       } catch (err) {
         showToast('Export failed', 'error');
       }
     }

     // ── Error Logs ─────────────────────────────────────────────────────────────
     async function loadErrors() {
       try {
         const res = await fetch('/errors?limit=50');
         const { data: errors } = await res.json();
         document.getElementById('errorsBody').innerHTML = errors.map(e => `
           <tr>
             <td style="color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:.72rem">${e.id}</td>
             <td><span class="role-badge role-${e.level}">${e.level}</span></td>
             <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.message}">${e.message}</td>
             <td>${e.source || '—'}</td>
             <td style="color:var(--text-dim);font-size:.75rem;font-family:'JetBrains Mono',monospace">${e.route || '—'}</td>
             <td style="color:var(--text-dim);font-size:.75rem">${e.created_at ? new Date(e.created_at).toLocaleString() : '—'}</td>
           </tr>
         `).join('');
       } catch {
         document.getElementById('errorsBody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--red)">Error loading logs</td></tr>';
       }
     }

     // ── Menu Items ─────────────────────────────────────────────────────────────
     async function loadMenu() {
       try {
         const res = await fetch('/admin/menu');
         const menu = await res.json();
         document.getElementById('menuBody').innerHTML = menu.map(m => `
           <tr>
             <td style="color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:.72rem">${m.id}</td>
             <td style="font-weight:500">${m.label}</td>
             <td style="color:var(--accent);font-size:1.2rem">${m.icon || '—'}</td>
             <td style="font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--text-dim)">${m.href}</td>
             <td>${m.order_index}</td>
             <td>${m.active ? '✓' : '✗'}</td>
           </tr>
         `).join('');
       } catch {
         document.getElementById('menuBody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--red)">Error loading menu</td></tr>';
       }
     }

     async function loadUsers(page = 1) {
      const limit = document.getElementById('userLimit').value;
      document.getElementById('usersBody').innerHTML = '<tr><td colspan="5" class="loading-cell"><div class="loading-dots"><span></span><span></span><span></span></div></td></tr>';
      try {
        const res = await fetch(`/users?page=${page}&limit=${limit}`);
        const { data: users, pages } = await res.json();
        if (!users || users.length === 0) {
          document.getElementById('usersBody').innerHTML = '<tr><td colspan="5"><div class="empty-state"><p>No users found</p></div></td></tr>';
          document.getElementById('userPager').innerHTML = '';
          return;
        }
        document.getElementById('usersBody').innerHTML = users.map(u => `
          <tr>
            <td style="color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:.72rem">${u.id}</td>
            <td style="font-weight:500">${u.username}</td>
            <td><span class="role-badge role-${u.role}">${u.role.toUpperCase()}</span></td>
            <td style="color:var(--text-dim);font-size:.75rem">${u.created_at ? new Date(u.created_at).toLocaleDateString() : '—'}</td>
            <td class="td-actions">
              <button class="btn-danger" onclick="deleteUser(${u.id})">Delete</button>
            </td>
          </tr>`).join('');
        // Pager
        const el = document.getElementById('userPager');
        if (pages <= 1) { el.innerHTML = ''; return; }
        let h = `<button class="page-btn" onclick="loadUsers(${page-1})" ${page<=1?'disabled':''}>‹</button>`;
        for (let i = 1; i <= pages; i++) {
          if (i === 1 || i === pages || (i >= page-2 && i <= page+2))
            h += `<button class="page-btn ${i===page?'active':''}" onclick="loadUsers(${i})">${i}</button>`;
          else if (i === page-3 || i === page+3) h += '<span class="page-ellipsis">…</span>';
        }
        h += `<button class="page-btn" onclick="loadUsers(${page+1})" ${page>=pages?'disabled':''}>›</button>`;
        h += `<span class="page-info">Page ${page} of ${pages}</span>`;
        el.innerHTML = h;
      } catch {
        document.getElementById('usersBody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:1.5rem;color:var(--red)">Error loading users</td></tr>';
      }
    }
     loadUsers();
     loadErrors();
     loadMenu();
   </script>

  <style>
    @media (max-width: 900px) {
      .page-wrapper > div:first-child { grid-template-columns: 1fr !important; }
    }
  </style>
</body>
</html>
