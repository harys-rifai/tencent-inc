<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INVBIT — Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">INV<span class="accent">BIT</span></span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">DASHBOARD</div>
      <a href="index.html" class="nav-item"><span class="nav-icon">◈</span> Overview</a>
      <a href="inventory.html" class="nav-item"><span class="nav-icon">◉</span> Inventory</a>
      <a href="network.html" class="nav-item"><span class="nav-icon">◎</span> Network</a>
      <div class="nav-section-label" style="margin-top:1.5rem">SYSTEM</div>
      <a href="search.html" class="nav-item"><span class="nav-icon">◌</span> Search</a>
      <a href="settings.html" class="nav-item active"><span class="nav-icon">⚙</span> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="status-dot online"></div>
      <span>admin</span>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="topbar-title">Settings</div>
      <div class="topbar-right">
        <div class="health-badge"><span class="pulse"></span> SYSTEM ONLINE</div>
      </div>
    </header>

    <div class="page-wrapper">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">◈ Configuration</span>
        </div>
        <div class="panel-body">
          <div class="form-group">
            <label>Database Host</label>
            <input type="text" value="localhost" id="dbHost" />
          </div>
          <div class="form-group">
            <label>Database Port</label>
            <input type="text" value="5432" id="dbPort" />
          </div>
          <div class="form-group">
            <label>Redis Host</label>
            <input type="text" value="localhost" id="redisHost" />
          </div>
          <div class="form-group">
            <label>Redis Port</label>
            <input type="text" value="6379" id="redisPort" />
          </div>
          <button class="btn-primary" onclick="saveSettings()" style="margin-top:1rem">Save Settings</button>
        </div>
      </div>

      <div class="panel" style="margin-top:1.5rem">
        <div class="panel-header">
          <span class="panel-title">◉ User Management</span>
        </div>
        <div class="panel-body">
          <table class="data-table" id="usersTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersBody">
              <tr><td colspan="4" class="loading-cell"><div class="loading-dots"><span></span><span></span><span></span></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    async function loadUsers() {
      try {
        const res = await fetch('/users');
        const users = await res.json();
        document.getElementById('usersBody').innerHTML = users.map(u => 
          `<tr>
            <td>${u.id}</td>
            <td>${u.username}</td>
            <td><span class="role-badge role-${u.role}">${u.role.toUpperCase()}</span></td>
            <td class="td-actions">
              <button class="btn-sm" onclick="editUser(${u.id})">Edit</button>
              <button class="btn-danger" onclick="deleteUser(${u.id})">Delete</button>
            </td>
          </tr>`
        ).join('');
      } catch (err) {
        document.getElementById('usersBody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--red)">Error loading users</td></tr>';
      }
    }

    function saveSettings() {
      alert('Settings saved successfully');
    }

    function editUser(id) {
      alert('Edit user ' + id);
    }

    async function deleteUser(id) {
      if (confirm('Delete user ' + id + '?')) {
        alert('User deleted');
        loadUsers();
      }
    }

    document.getElementById('menuToggle').onclick = () => document.getElementById('sidebar').classList.toggle('open');
    loadUsers();
  </script>
</body>
</html>
